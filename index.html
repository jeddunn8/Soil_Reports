<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>TCCA Soil Report</title>
<link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/light/main.css">
<script src="https://js.arcgis.com/4.28/"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Helvetica,Arial,sans-serif;background:#f5f5f5;color:#333}
.h{background:#1B3A5C;color:#fff;padding:14px 20px}
.h h1{font-size:20px}
.c{background:#fff;padding:16px 20px;border-bottom:2px solid #1B3A5C;display:flex;gap:10px;align-items:center}
.c input{padding:8px 12px;font-size:14px;border:2px solid #ccc;border-radius:4px;width:180px}
.b{background:#1B3A5C;color:#fff;border:none;padding:8px 20px;font-size:14px;border-radius:4px;cursor:pointer;font-weight:bold}
.b:hover{background:#2a5580}
#s{padding:10px 20px;font-size:13px;color:#666;display:none}
#r{padding:20px;display:none}
.rc{background:#fff;max-width:1100px;margin:0 auto;border:1px solid #ddd;border-radius:4px;overflow:hidden}
.rh{background:#1B3A5C;color:#fff;padding:14px 20px}
.rh h2{font-size:20px;margin:0}
.rb{padding:16px 20px}
.ig{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px 20px;margin-bottom:16px;font-size:13px}
.ig b{color:#1B3A5C}
.rb h3{color:#1B3A5C;font-size:14px;margin:16px 0 8px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{background:#1B3A5C;color:#fff;padding:6px 4px;text-align:center;border:1px solid #1B3A5C}
thead th:first-child{text-align:left}
tbody td{padding:4px;text-align:center;border:1px solid #CCC}
tbody td:first-child{text-align:left}
tbody tr:nth-child(even){background:#F0F0F0}
.t{background:#E8E8E8!important;font-weight:bold}
.f{margin-top:20px;text-align:center;font-size:10px;color:#999;border-top:1px solid #CCC;padding-top:6px}
.np{text-align:center;margin:8px}
.bp{background:#2ecc71;color:#fff;border:none;padding:8px 20px;font-size:14px;border-radius:4px;cursor:pointer}
@media print{.h,.c,#s,.np{display:none!important}#r{padding:0}.rc{border:none}@page{size:landscape;margin:.5in}}
</style></head>
<body>
<div class="h"><h1>TCCA Soil Report Generator</h1></div>
<div class="c"><b style="color:#1B3A5C">Farm Number:</b> <input id="fn" value="1071"> <button class="b" id="go">Generate Report</button></div>
<div id="s"></div><div id="r"></div>
<script>
var PORTAL="https://tillamookfarm.maps.arcgis.com";
var SERVER="https://services3.arcgis.com/6rtKUOn0HwWMTo5b/arcgis";
var QUERY_URL=SERVER+"/rest/services/Dashboard_Internal_WFL1/FeatureServer/8/query";
var APP_ID="PZTMDvs9PDdeYrAu";
var serverToken="";

require(["esri/config","esri/identity/OAuthInfo","esri/identity/IdentityManager"],function(cfg,OAuthInfo,idm){
cfg.portalUrl=PORTAL;
var info=new OAuthInfo({appId:APP_ID,portalUrl:PORTAL,popup:false});
idm.registerOAuthInfos([info]);
idm.checkSignInStatus(PORTAL+"/sharing").catch(function(){
return idm.getCredential(PORTAL+"/sharing");
}).then(function(cred){
fetch(PORTAL+"/sharing/rest/generateToken",{method:"POST",body:new URLSearchParams({token:cred.token,serverUrl:SERVER,f:"json"})}).then(function(r){return r.json();}).then(function(d){
if(d.token){serverToken=d.token;console.log("Ready. Server token obtained.");}
});
});
});

function fm(v,d){if(v==null||v==="")return"";return parseFloat(v).toFixed(d!=null?d:1);}

function buildMap(fs,fn,pr,sr){
return new Promise(function(resolve){
var xs=[],ys=[];
for(var i=0;i<fs.length;i++){
var g=fs[i].geometry;
if(g&&g.rings){for(var j=0;j<g.rings.length;j++){for(var k=0;k<g.rings[j].length;k++){xs.push(g.rings[j][k][0]);ys.push(g.rings[j][k][1]);}}}
}
if(xs.length===0){resolve("");return;}
var xr=(Math.max.apply(null,xs)-Math.min.apply(null,xs))||0.001;
var yr=(Math.max.apply(null,ys)-Math.min.apply(null,ys))||0.001;
var xmin=Math.min.apply(null,xs)-xr*0.05;
var ymin=Math.min.apply(null,ys)-yr*0.05;
var xmax=Math.max.apply(null,xs)+xr*0.05;
var ymax=Math.max.apply(null,ys)+yr*0.05;
var dw=xmax-xmin;
var dh=ymax-ymin;
var targetRatio=W/H;
var dataRatio=dw/dh;
if(dataRatio<targetRatio){var newW=dh*targetRatio;var pad=(newW-dw)/2;xmin-=pad;xmax+=pad;}
else{var newH=dw/targetRatio;var pad=(newH-dh)/2;ymin-=pad;ymax+=pad;}
var ex={a:xmin,b:ymin,c:xmax,d:ymax};
var W=1000,H=600;
var cv=document.createElement("canvas");cv.width=W;cv.height=H;
var cx=cv.getContext("2d");
var wk=(sr&&sr.wkid)?sr.wkid:102100;
var bmUrl="https://services.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/export?bbox="+ex.a+","+ex.b+","+ex.c+","+ex.d+"&bboxSR="+wk+"&size="+W+","+H+"&imageSR="+wk+"&format=png&f=image";

function drawOverlay(){
for(var i=0;i<fs.length;i++){
var g=fs[i].geometry;
if(!g||!g.rings)continue;
for(var j=0;j<g.rings.length;j++){
cx.beginPath();
for(var k=0;k<g.rings[j].length;k++){
var px=(g.rings[j][k][0]-ex.a)/(ex.c-ex.a)*W;
var py=H-(g.rings[j][k][1]-ex.b)/(ex.d-ex.b)*H;
if(k===0)cx.moveTo(px,py);else cx.lineTo(px,py);
}
cx.closePath();cx.fillStyle="rgba(46,204,113,0.5)";cx.fill();cx.strokeStyle="#FFFF00";cx.lineWidth=3;cx.stroke();
}}
cx.font="bold 10px Helvetica";cx.textAlign="center";cx.textBaseline="middle";
for(var i=0;i<fs.length;i++){
var g=fs[i].geometry;
if(!g||!g.rings)continue;
var ax=[],ay=[];
for(var j=0;j<g.rings.length;j++){for(var k=0;k<g.rings[j].length;k++){ax.push(g.rings[j][k][0]);ay.push(g.rings[j][k][1]);}}
var mx=0,my=0;for(var j=0;j<ax.length;j++){mx+=ax[j];my+=ay[j];}mx/=ax.length;my/=ay.length;
var px=(mx-ex.a)/(ex.c-ex.a)*W;var py=H-(my-ex.b)/(ex.d-ex.b)*H;
var lb=(fs[i].attributes.PastureNumber||"").toString().replace(fn+"-","");
var m=cx.measureText(lb);
cx.fillStyle="rgba(255,255,255,0.85)";cx.fillRect(px-m.width/2-2,py-6,m.width+4,12);
cx.fillStyle="#1B3A5C";cx.fillText(lb,px,py);
}
cx.font="bold 16px Helvetica";cx.textAlign="center";
var ti="Farm "+fn+": "+pr;var tm=cx.measureText(ti);
cx.fillStyle="rgba(255,255,255,0.85)";cx.fillRect(W/2-tm.width/2-10,8,tm.width+20,26);
cx.fillStyle="#1B3A5C";cx.fillText(ti,W/2,22);
resolve('<h3>Farm Map</h3><img src="'+cv.toDataURL("image/png")+'" style="width:100%;max-width:950px;border:2px solid #1B3A5C;border-radius:4px;display:block;margin:0 auto">');
}

var img=new Image();
img.crossOrigin="anonymous";
img.onload=function(){cx.drawImage(img,0,0,W,H);drawOverlay();};
img.onerror=function(){cx.fillStyle="#ddd";cx.fillRect(0,0,W,H);drawOverlay();};
img.src=bmUrl;
});
}

document.getElementById("go").addEventListener("click",function(){
var fn=document.getElementById("fn").value.trim();
if(!fn){alert("Enter a farm number.");return;}
if(!serverToken){alert("Still authenticating. Wait a moment and try again.");return;}
var s=document.getElementById("s");s.style.display="block";s.textContent="Loading farm "+fn+"...";
document.getElementById("go").disabled=true;

fetch(QUERY_URL+"?where="+encodeURIComponent("PrimProdNum='"+fn+"'")+"&outFields=PrimProdNum,PastureNumber,Producer,CAFO_Size,Acreage,Nitrate,Ammonia,Phosphate,Potassium,OrgCarbon,PHLevel&returnGeometry=true&f=json&token="+encodeURIComponent(serverToken)).then(function(r){return r.json();}).then(function(d){
if(d.error){throw new Error(d.error.message);}
if(!d.features||d.features.length===0){s.textContent="No pastures found for farm "+fn;document.getElementById("go").disabled=false;return;}
var fs=d.features,fi=fs[0].attributes;
var pr=fi.Producer||"Unknown",ca=fi.CAFO_Size||"Unknown";
var ta=0;for(var i=0;i<fs.length;i++){ta+=parseFloat(fs[i].attributes.Acreage||0);}
s.textContent="Found "+fs.length+" pastures. Drawing map...";

buildMap(fs,fn,pr,d.spatialReference).then(function(mapHtml){
var rd=new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
var ro="",ru=0;
for(var i=0;i<fs.length;i++){var a=fs[i].attributes,ac=parseFloat(a.Acreage||0);ru+=ac;
ro+="<tr><td>"+(a.PastureNumber||"")+"</td><td style='text-align:right'>"+fm(ac,2)+"</td><td>"+fm(a.Nitrate)+"</td><td>"+fm(a.Ammonia)+"</td><td>"+fm(a.Phosphate)+"</td><td>"+fm(a.Potassium,0)+"</td><td>"+fm(a.OrgCarbon)+"</td><td>"+fm(a.PHLevel)+"</td></tr>";}
ro+='<tr class="t"><td>TOTAL</td><td style="text-align:right">'+ru.toFixed(2)+'</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>';
document.getElementById("r").innerHTML='<div class="rc"><div class="rh"><h2>TCCA Soil Sampling Report</h2></div><div class="rb"><hr style="border:none;border-top:3px solid #1B3A5C;margin:0 0 12px"><div class="ig"><div><b>Farm:</b> '+fn+'</div><div><b>Producer:</b> '+pr+'</div><div><b>CAFO:</b> '+ca+'</div><div><b>Pastures:</b> '+fs.length+'</div><div><b>Acres:</b> '+ta.toFixed(2)+'</div><div><b>Date:</b> '+rd+'</div></div>'+mapHtml+'<h3>Soil Sample Results</h3><table><thead><tr><th>Pasture</th><th>Acres</th><th>Nitrate<br>(ppm)</th><th>Ammonia<br>(ppm)</th><th>Phosphate<br>(ppm)</th><th>Potassium<br>(ppm)</th><th>Org Matter<br>(%)</th><th>pH</th></tr></thead><tbody>'+ro+'</tbody></table><div class="f">Tillamook County Creamery Association, Natural Resources Department</div></div></div><div class="np"><button class="bp" onclick="window.print()">Print / Save as PDF</button></div>';
document.getElementById("r").style.display="block";s.style.display="none";document.getElementById("go").disabled=false;
});
}).catch(function(e){s.textContent="Error: "+e.message;document.getElementById("go").disabled=false;});
});
document.getElementById("fn").addEventListener("keyup",function(e){if(e.key==="Enter")document.getElementById("go").click();});
</script></body></html>
